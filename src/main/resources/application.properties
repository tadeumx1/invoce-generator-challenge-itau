spring.application.name=invoice-generator

# F-AUTH — HS256 JWT signing. The secret MUST be at least 32 bytes (256 bits). The
# default below is a demo placeholder; production overrides via SECURITY_JWT_SECRET.
app.security.jwt.secret=${SECURITY_JWT_SECRET:change-me-please-this-is-a-demo-only-32-char-secret!}
app.security.jwt.issuer=invoice-generator
app.security.jwt.expiry=PT1H

# F-DEFECTS-PERFORMANCE — gate for the Kafka messaging config (producers, consumers, topics).
# Tests that want to exclude Kafka set this to false and provide a no-op dispatcher.
app.messaging.kafka.enabled=true

# Kafka producer (F-DEFECTS-PERFORMANCE)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.delivery.timeout.ms=10000
spring.kafka.producer.properties.request.timeout.ms=5000
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# Kafka consumer (used from T2 onward)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=br.com.itau.invoicegenerator.*
spring.kafka.consumer.properties.spring.json.value.default.type=br.com.itau.invoicegenerator.adapter.messaging.IntegrationEvent
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual

# Kafka retry topics (used by @RetryableTopic on integration consumers). attempts=4 means
# original delivery + 3 retries before DLT.
app.kafka.retry.attempts=4
app.kafka.retry.delay-ms=60000
app.kafka.retry.multiplier=5.0

# KafkaAdmin: create topics defined as @Bean NewTopic, but do not fail app startup if broker is down
spring.kafka.admin.fail-fast=false

# F-OBSERVABILITY T4 — Spring Kafka Observation API (producer + listener spans, traceparent
# propagation). Spring Kafka publishes a `spring.kafka.template` producer span and a
# `spring.kafka.listener` consumer span; both are linked through W3C trace context.
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# F-RESILIENCE — circuit breakers on outbound port adapters.
# Defaults below are sane for the demo: open after 50% failure rate over the last 10 calls
# (with a minimum of 5 sampled), stay open for 10s, allow 3 probe calls in half-open.
resilience4j.circuitbreaker.instances.stockPort.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.stockPort.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.stockPort.sliding-window-size=10
resilience4j.circuitbreaker.instances.stockPort.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.stockPort.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.stockPort.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.stockPort.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.invoiceRegistrationPort.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.invoiceRegistrationPort.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.invoiceRegistrationPort.sliding-window-size=10
resilience4j.circuitbreaker.instances.invoiceRegistrationPort.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.invoiceRegistrationPort.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.invoiceRegistrationPort.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.invoiceRegistrationPort.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.deliveryPort.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.deliveryPort.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.deliveryPort.sliding-window-size=10
resilience4j.circuitbreaker.instances.deliveryPort.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.deliveryPort.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.deliveryPort.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.deliveryPort.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.accountsReceivablePort.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.accountsReceivablePort.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.accountsReceivablePort.sliding-window-size=10
resilience4j.circuitbreaker.instances.accountsReceivablePort.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.accountsReceivablePort.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.accountsReceivablePort.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.accountsReceivablePort.automatic-transition-from-open-to-half-open-enabled=true

# F-BULKHEAD — semaphore bulkheads on the same four outbound adapters that carry the
# F-RESILIENCE circuit breakers. One bulkhead per adapter (watertight compartments — a
# slow adapter must not starve permits a fast adapter could have used). max-wait-duration=0
# is fail-fast: a permit-exhausted call is rejected immediately, NOT queued. Rejected calls
# bubble to the @RetryableTopic retry path. Calibration rationale + AD-033 live in
# docs/bulkhead-strategy.md. Numbers are tunable per environment without code changes.
resilience4j.bulkhead.instances.stockPort.max-concurrent-calls=20
resilience4j.bulkhead.instances.stockPort.max-wait-duration=0

resilience4j.bulkhead.instances.invoiceRegistrationPort.max-concurrent-calls=20
resilience4j.bulkhead.instances.invoiceRegistrationPort.max-wait-duration=0

# deliveryPort is intentionally tighter (5 vs 20): its Thread.sleep(5000) means each call
# holds a permit for 5s, so a high ceiling would authorise the system to start a large
# number of slow operations in parallel. See docs/bulkhead-strategy.md §4-5.
resilience4j.bulkhead.instances.deliveryPort.max-concurrent-calls=5
resilience4j.bulkhead.instances.deliveryPort.max-wait-duration=0

resilience4j.bulkhead.instances.accountsReceivablePort.max-concurrent-calls=20
resilience4j.bulkhead.instances.accountsReceivablePort.max-wait-duration=0

# F-OBSERVABILITY — Actuator surface, Micrometer Prometheus scrape, OTLP tracing.
# Actuator endpoints are served on the application port (8080). When F-AWS lands and the
# API Gateway only forwards /api/*, /actuator/* stays internal by routing, not by port.
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=invoice-generator
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.observations.annotations.enabled=true

# Log every request through the Actuator HTTP timer so SLI-1 (success) and SLI-2 (latency)
# can be computed from a single meter.
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=300ms,800ms,2s
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# F-RATELIMIT — per-IP rate limiting via resilience4j-ratelimiter.
# Three statically-named instances; the RateLimitFilter synthesises a per-(group, ip) limiter at
# runtime so a noisy client only depletes its own bucket. See .specs/features/ratelimit/design.md
# for the full design, AD-RLIM-1..5 for the trade-offs, and AD-020 for the cardinality guard.
# timeout-duration=0 = fail-fast (return 429 immediately, don't block the Tomcat worker).
resilience4j.ratelimiter.instances.auth-login.limit-for-period=5
resilience4j.ratelimiter.instances.auth-login.limit-refresh-period=60s
resilience4j.ratelimiter.instances.auth-login.timeout-duration=0
resilience4j.ratelimiter.instances.auth-login.register-health-indicator=false

resilience4j.ratelimiter.instances.invoice-generate.limit-for-period=30
resilience4j.ratelimiter.instances.invoice-generate.limit-refresh-period=60s
resilience4j.ratelimiter.instances.invoice-generate.timeout-duration=0
resilience4j.ratelimiter.instances.invoice-generate.register-health-indicator=false

resilience4j.ratelimiter.instances.default.limit-for-period=60
resilience4j.ratelimiter.instances.default.limit-refresh-period=60s
resilience4j.ratelimiter.instances.default.timeout-duration=0
resilience4j.ratelimiter.instances.default.register-health-indicator=false
